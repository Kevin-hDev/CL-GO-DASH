[package]
name = "cl-go-dash"
version = "0.1.0"
edition = "2021"

[lib]
name = "cl_go_dash_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[[bin]]
name = "cl-go-dash"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# Framework
tauri = { version = "2", features = [] }
tauri-plugin-fs = "2"
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
dirs = "6"
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.13", features = ["json", "stream", "rustls", "query"] }

# Streaming NDJSON
tokio-util = { version = "0.7", features = ["io"] }
futures-util = "0.3"

# HTML -> Markdown
htmd = "0.5"

# Readability
dom_smoothie = { version = "0.10", features = ["aho-corasick"] }

# PDF
pdf-extract = "0.10"

# DOCX
zip = "8"
quick-xml = "0.37"

# XLSX
calamine = "0.34"

# Base64
base64 = "0.22"

# Keyring
keyring = { version = "3.6", features = ["apple-native", "windows-native", "sync-secret-service"] }

# Shell cross-platform
which = "7"

# Token counting (goliapkg — supporte LLaMA, Qwen, DeepSeek, Mistral)
tiktoken = "3.1"

# Existants
regex = "1"
libc = "0.2"
notify = { version = "7", features = ["macos_fsevent"] }

# Tools grep/glob (crates de ripgrep)
grep = "0.3"
grep-regex = "0.1"
grep-searcher = "0.1"
ignore = "0.4"
globset = "0.4"

# Traductions pré-bundlées (embarquées dans le binaire)
include_dir = "0.7"
