use_default_settings: true

general:
  debug: false
  instance_name: "CL-GO Search"
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - json

server:
  port: {{PORT}}
  bind_address: "127.0.0.1"
  base_url: false
  limiter: false
  public_instance: false
  secret_key: "{{SECRET}}"
  image_proxy: false
  method: "GET"

valkey:
  url: false

ui:
  default_theme: simple
  query_in_title: false
