<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CL-GO</title>
    <script>
      (function() {
        var t = localStorage.getItem("clgo-theme");
        if (t === "system" || (t !== "light" && t !== "dark")) {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <link rel="preload" href="/splash-icon.png" as="image" />
    <link rel="preload" href="/splash-icon-light.png" as="image" />
    <style>
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      [data-theme="dark"] #splash {
        background: #121212;
      }
      [data-theme="light"] #splash {
        background: #f7f7f9;
      }
      #splash .splash-icon {
        width: 96px;
        height: 96px;
        display: none;
      }
      [data-theme="dark"] #splash .splash-dark { display: block; }
      [data-theme="light"] #splash .splash-light { display: block; }
    </style>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <img class="splash-icon splash-dark" src="/splash-icon.png" alt="" />
      <img class="splash-icon splash-light" src="/splash-icon-light.png" alt="" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
