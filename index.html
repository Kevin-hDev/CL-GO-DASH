<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CL-GO</title>
    <script>
      (function() {
        var t = localStorage.getItem("clgo-theme");
        if (t === "system" || (t !== "light" && t !== "dark")) {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <link rel="preload" href="/castor.svg" as="image" type="image/svg+xml" />
    <style>
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      [data-theme="dark"] #splash {
        background: #121212;
        --splash-mark: #c8c8ce;
      }
      [data-theme="light"] #splash {
        background: #f7f7f9;
        --splash-mark: #1a1a1a;
      }
      #splash .splash-icon {
        width: 144px;
        height: 144px;
        display: block;
        background: var(--splash-mark);
        -webkit-mask: url("/castor.svg") center / contain no-repeat;
        mask: url("/castor.svg") center / contain no-repeat;
      }
    </style>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <span class="splash-icon"></span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
