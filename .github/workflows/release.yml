name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (ex: v0.6.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            bundles: dmg
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            bundles: deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            bundles: nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            zstd

      - name: Install npm dependencies
        run: npm ci

      - name: Extract release notes
        id: release_notes
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const version = (process.env.RELEASE_VERSION || "").replace(/^v/, "");
          const changelog = fs.readFileSync("CHANGELOG.md", "utf8").split(/\r?\n/);
          const versionStart = changelog.findIndex((line) => line === `## v${version}`);
          if (versionStart < 0) {
            throw new Error(`Missing CHANGELOG.md section for v${version}`);
          }

          const versionEnd = changelog.findIndex((line, index) => index > versionStart && /^## v/.test(line));
          const versionLines = changelog.slice(versionStart + 1, versionEnd < 0 ? undefined : versionEnd);
          const notesStart = versionLines.findIndex((line) => line === "### App release notes");
          if (notesStart < 0) {
            throw new Error(`Missing ### App release notes section for v${version}`);
          }

          const nextHeading = versionLines.findIndex((line, index) =>
            index > notesStart && (/^### /.test(line) || /^## /.test(line) || line === "---")
          );
          const lines = versionLines
            .slice(notesStart + 1, nextHeading < 0 ? undefined : nextHeading)
            .map((line) => line.trim())
            .filter(Boolean);
          const bullets = lines.filter((line) => line.startsWith("- "));
          if (bullets.length < 1 || bullets.length > 6 || bullets.length !== lines.length) {
            throw new Error("App release notes must contain 1 to 6 bullet lines only");
          }
          for (const bullet of bullets) {
            if ([...bullet.slice(2)].length > 180) {
              throw new Error(`App release note is too long: ${bullet}`);
            }
          }

          const body = ["### App release notes", "", ...bullets].join("\n");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `body<<EOF\n${body}\nEOF\n`);
          NODE

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
          APPIMAGE_EXTRACT_AND_RUN: "1"
        with:
          tagName: ${{ inputs.version || github.ref_name }}
          releaseName: "CL-GO ${{ inputs.version || github.ref_name }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
